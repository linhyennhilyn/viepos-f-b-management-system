server:
  port: 8080

spring:
  application:
    name: viepos-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 1 day in ms

store:
  code: ${STORE_CODE:HCM01}

# Xóa ảnh minh chứng CK (cột transfer_proof_image_url) sau N ngày từ paid_at
viepos:
  transfer-proof:
    retention-days: 2
    cleanup-cron: "0 0 3 * * *"
